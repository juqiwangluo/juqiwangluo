<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业微信投诉</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1677ff',
                        success: '#52c41a',
                        warning: '#faad14',
                        danger: '#f5222d',
                        info: '#1890ff'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 投诉原因选择页面 -->
    <div id="reasonPage" class="min-h-screen bg-white">
        <!-- 顶部导航 -->
        <div class="flex items-center justify-between px-4 py-4 border-b border-gray-200">
            <button id="backBtn1" class="text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <h1 class="text-lg font-medium text-gray-900">投诉</h1>
            <div class="w-5"></div>
        </div>
        
        <!-- 投诉原因列表 -->
        <div class="px-4 py-4">
            <p class="text-gray-600 mb-4">请选择投诉该账号的原因：</p>
            
            <div class="space-y-1">
                <div class="complaint-option py-4 border-b border-gray-100 flex justify-between items-center" data-type="harassment">
                    <span class="text-gray-800">发布不适当内容对我造成骚扰</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
                
                <div class="complaint-option py-4 border-b border-gray-100 flex justify-between items-center" data-type="fraud">
                    <span class="text-gray-800">存在欺诈骗钱行为</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
                
                <div class="complaint-option py-4 border-b border-gray-100 flex justify-between items-center" data-type="hacked">
                    <span class="text-gray-800">此账号可能被盗用了</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
                
                <div class="complaint-option py-4 border-b border-gray-100 flex justify-between items-center" data-type="infringement">
                    <span class="text-gray-800">存在侵权行为(侵犯知识产权、人身权)</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
                
                <div class="complaint-option py-4 border-b border-gray-100 flex justify-between items-center" data-type="counterfeit">
                    <span class="text-gray-800">发布仿冒品信息</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
                
                <div class="complaint-option py-4 border-b border-gray-100 flex justify-between items-center" data-type="impersonation">
                    <span class="text-gray-800">冒充他人</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
                
                <div class="complaint-option py-4 border-b border-gray-100 flex justify-between items-center" data-type="minor_abuse">
                    <span class="text-gray-800">侵犯未成年人权益</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
                
                <div class="complaint-option py-4 flex justify-between items-center" data-type="fan_behavior">
                    <span class="text-gray-800">粉丝无底线追星行为</span>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
                    </svg>
                </div>
            </div>
        </div>
        
        <!-- 底部投诉须知 -->
        <div class="mt-8 px-4 pb-4">
            <a href="#" class="text-primary text-center block text-sm">投诉须知</a>
        </div>
    </div>
    
    <!-- 投诉详情页面 -->
    <div id="detailPage" class="min-h-screen bg-white hidden">
        <!-- 顶部导航 -->
        <div class="flex items-center justify-between px-4 py-4 border-b border-gray-200">
            <button id="backBtn2" class="text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                </svg>
            </button>
            <h1 class="text-lg font-medium text-gray-900">投诉</h1>
            <div class="w-5"></div>
        </div>
        
        <!-- 投诉详情表单 -->
        <div class="px-4 py-4">
            <!-- 聊天证据 -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-gray-800">聊天证据(必填)</span>
                    <span id="chatEvidenceCount" class="text-gray-400 text-sm">0条聊天证据</span>
                </div>
                <p class="text-xs text-gray-500 mb-3">需收集此信息以判定投诉结果。</p>
                <div id="chatEvidence" class="border border-gray-200 rounded-md p-4 text-center">
                    <svg class="w-12 h-12 text-gray-400 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg>
                    <p class="text-sm text-gray-500">点击选择聊天记录</p>
                </div>
            </div>
            
            <!-- 图片证据 -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-gray-800">图片证据(选填)</span>
                    <span id="imageEvidenceCount" class="text-gray-400 text-sm">0张/9</span>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div id="addImageBtn" class="border-2 border-dashed border-gray-200 rounded-md h-24 flex items-center justify-center">
                        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                        </svg>
                    </div>
                    <!-- 图片预览将动态添加 -->
                </div>
            </div>
            
            <!-- 手机号 -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-gray-800">手机号(必填)</span>
                </div>
                <input type="tel" id="phoneNumber" class="w-full border border-gray-200 rounded-md p-3" placeholder="请输入您的手机号">
            </div>
            
            <!-- 投诉内容 -->
            <div class="mb-6">
                <div class="flex justify-between items-center mb-2">
                    <span class="text-gray-800">投诉内容(选填)</span>
                    <span id="complaintContentCount" class="text-gray-400 text-sm">0/200</span>
                </div>
                <textarea id="complaintContent" class="w-full border border-gray-200 rounded-md p-3 h-32 resize-none" placeholder="请描述您遇到的问题"></textarea>
            </div>
            
            <!-- 提交按钮 -->
            <button id="submitBtn" class="w-full bg-gray-300 text-gray-500 py-3 rounded-md font-medium">提交</button>
        </div>
    </div>
    
    <!-- 投诉成功页面 -->
    <div id="successPage" class="min-h-screen bg-white hidden">
        <!-- 顶部导航 -->
        <div class="flex items-center justify-between px-4 py-4 border-b border-gray-200">
            <div class="w-5"></div>
            <h1 class="text-lg font-medium text-gray-900">企业微信投诉</h1>
            <button id="closeBtn" class="text-gray-600">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
        
        <!-- 成功内容 -->
        <div class="flex flex-col items-center justify-center h-[80vh]">
            <div class="w-24 h-24 rounded-full bg-success flex items-center justify-center mb-6">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                </svg>
            </div>
            <h2 class="text-xl font-medium text-gray-900 mb-2">投诉已提交</h2>
            <p class="text-gray-500 text-center px-8">你的投诉已经提交审核，我们会尽快处理。</p>
        </div>
    </div>
    
    <script>
        // 页面切换
        const reasonPage = document.getElementById('reasonPage');
        const detailPage = document.getElementById('detailPage');
        const successPage = document.getElementById('successPage');
        
        // 投诉类型选择
        document.querySelectorAll('.complaint-option').forEach(option => {
            option.addEventListener('click', function() {
                reasonPage.classList.add('hidden');
                detailPage.classList.remove('hidden');
            });
        });
        
        // 返回按钮
        document.getElementById('backBtn1').addEventListener('click', function() {
            // 可以返回上一页或关闭页面
            window.history.back();
        });
        
        document.getElementById('backBtn2').addEventListener('click', function() {
            detailPage.classList.add('hidden');
            reasonPage.classList.remove('hidden');
        });
        
        // 关闭按钮
        document.getElementById('closeBtn').addEventListener('click', function() {
            // 可以返回上一页或关闭页面
            window.history.back();
        });
        
        // 聊天证据选择
        document.getElementById('chatEvidence').addEventListener('click', function() {
            // 模拟选择聊天证据
            document.getElementById('chatEvidenceCount').textContent = '1条聊天证据';
            alert('已选择聊天证据');
        });
        
        // 图片证据上传
        let imageCount = 0;
        document.getElementById('addImageBtn').addEventListener('click', function() {
            if (imageCount < 9) {
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                fileInput.onchange = function(e) {
                    if (e.target.files && e.target.files[0]) {
                        imageCount++;
                        document.getElementById('imageEvidenceCount').textContent = `${imageCount}张/9`;
                        
                        // 创建图片预览
                        const imgPreview = document.createElement('div');
                        imgPreview.className = 'relative border border-gray-200 rounded-md h-24 overflow-hidden';
                        imgPreview.innerHTML = `
                            <img src="${URL.createObjectURL(e.target.files[0])}" class="w-full h-full object-cover">
                            <button class="absolute top-1 right-1 bg-black bg-opacity-50 text-white rounded-full w-6 h-6 flex items-center justify-center delete-image">
                                ×
                            </button>
                        `;
                        
                        // 插入到添加按钮之前
                        this.parentElement.insertBefore(imgPreview, this);
                        
                        // 添加删除图片功能
                        imgPreview.querySelector('.delete-image').addEventListener('click', function() {
                            imgPreview.remove();
                            imageCount--;
                            document.getElementById('imageEvidenceCount').textContent = `${imageCount}张/9`;
                        });
                    }
                };
                fileInput.click();
            } else {
                alert('最多只能上传9张图片');
            }
        });
        
        // 投诉内容字数统计
        document.getElementById('complaintContent').addEventListener('input', function() {
            const count = this.value.length;
            document.getElementById('complaintContentCount').textContent = `${count}/200`;
        });
        
        // 提交投诉
        document.getElementById('submitBtn').addEventListener('click', function() {
            const chatEvidenceCount = document.getElementById('chatEvidenceCount').textContent;
            const phoneNumber = document.getElementById('phoneNumber').value;
            const complaintContent = document.getElementById('complaintContent').value;
            
            if (chatEvidenceCount === '0条聊天证据') {
                alert('请选择聊天证据');
                return;
            }
            
            if (!phoneNumber) {
                alert('请输入手机号');
                return;
            }
            
            // 模拟提交
            detailPage.classList.add('hidden');
            successPage.classList.remove('hidden');
        });
    </script>
</body>
</html>
