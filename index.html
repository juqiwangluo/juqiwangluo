<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业微信防风投诉配置</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1677ff',
                        success: '#52c41a',
                        warning: '#faad14',
                        danger: '#f5222d',
                        info: '#1890ff'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-md p-6">
            <h1 class="text-2xl font-bold text-center text-gray-800 mb-6">企业微信防风投诉配置</h1>
            
            <div class="mb-6">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">投诉规则配置</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">企业ID</label>
                        <input type="text" id="corpId" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" placeholder="请输入企业ID">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">应用Secret</label>
                        <input type="password" id="appSecret" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" placeholder="请输入应用Secret">
                    </div>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">投诉类型</label>
                        <select id="complaintType" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            <option value="harassment">发布不适当内容对我造成骚扰</option>
                            <option value="fraud">存在欺诈骗钱行为</option>
                            <option value="hacked">此账号可能被盗用了</option>
                            <option value="infringement">存在侵权行为(侵犯知识产权、人身权)</option>
                            <option value="counterfeit">发布仿冒品信息</option>
                            <option value="impersonation">冒充他人</option>
                            <option value="minor_abuse">侵犯未成年人权益</option>
                            <option value="fan_behavior">粉丝无底线追星行为</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">处理优先级</label>
                        <select id="priority" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            <option value="high">高</option>
                            <option value="medium">中</option>
                            <option value="low">低</option>
                        </select>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">自动处理规则</label>
                    <textarea id="autoRule" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary h-24" placeholder="请输入自动处理规则，例如：包含关键词'诈骗'的投诉自动标记为高优先级"></textarea>
                </div>
                
                <div class="flex items-center mb-4">
                    <input type="checkbox" id="enableAuto" class="w-4 h-4 text-primary focus:ring-primary border-gray-300 rounded">
                    <label for="enableAuto" class="ml-2 block text-sm text-gray-700">启用自动处理</label>
                </div>
            </div>
            
            <div class="mb-6">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">通知配置</h2>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">通知方式</label>
                        <select id="notifyType" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary">
                            <option value="wechat">企业微信通知</option>
                            <option value="email">邮件通知</option>
                            <option value="sms">短信通知</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">通知接收人</label>
                        <input type="text" id="notifyReceiver" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" placeholder="请输入通知接收人ID或邮箱">
                    </div>
                </div>
            </div>
            
            <div class="mb-6">
                <h2 class="text-lg font-semibold text-gray-700 mb-4">微信客户投诉设置</h2>
                
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1">微信客户投诉链接</label>
                    <input type="text" id="wechatComplaintLink" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary" value="http://localhost:8000/complaint.html">
                    <p class="text-xs text-gray-500 mt-1">请输入完整的 URL 格式，例如：http://your-domain.com/complaint.html</p>
                    <p class="text-xs text-gray-500 mt-1">本地测试时可使用：http://localhost:8000/complaint.html</p>
                </div>
                
                <div class="flex items-center mb-4">
                    <input type="checkbox" id="enableWechatCustomer" class="w-4 h-4 text-primary focus:ring-primary border-gray-300 rounded">
                    <label for="enableWechatCustomer" class="ml-2 block text-sm text-gray-700">启用微信客户投诉功能</label>
                </div>
            </div>
            
            <div class="flex justify-center space-x-4">
                <button id="saveBtn" class="px-6 py-2 bg-primary text-white rounded-md hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">保存配置</button>
                <button id="testBtn" class="px-6 py-2 bg-info text-white rounded-md hover:bg-info/90 focus:outline-none focus:ring-2 focus:ring-info focus:ring-offset-2">测试连接</button>
                <button id="resetBtn" class="px-6 py-2 bg-gray-300 text-gray-700 rounded-md hover:bg-gray-400 focus:outline-none focus:ring-2 focus:ring-gray-400 focus:ring-offset-2">重置</button>
            </div>
        </div>
        
        <div class="mt-6 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">投诉记录</h2>
            <div class="overflow-x-auto">
                <table class="min-w-full divide-y divide-gray-200">
                    <thead class="bg-gray-50">
                        <tr>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">投诉ID</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">类型</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">优先级</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">状态</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">时间</th>
                            <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                        </tr>
                    </thead>
                    <tbody class="bg-white divide-y divide-gray-200" id="complaintList">
                        <!-- 投诉记录将通过 JavaScript 动态添加 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // 模拟数据
        const mockComplaints = [
            { id: 'CP001', type: '发布不适当内容对我造成骚扰', priority: '中', status: '处理中', time: '2026-04-14 10:00' },
            { id: 'CP002', type: '存在欺诈骗钱行为', priority: '高', status: '已处理', time: '2026-04-14 09:30' },
            { id: 'CP003', type: '此账号可能被盗用了', priority: '低', status: '待处理', time: '2026-04-14 08:45' },
            { id: 'CP004', type: '存在侵权行为(侵犯知识产权、人身权)', priority: '中', status: '处理中', time: '2026-04-14 08:30' },
            { id: 'CP005', type: '发布仿冒品信息', priority: '高', status: '待处理', time: '2026-04-14 08:15' }
        ];
        
        // 渲染投诉记录
        function renderComplaints() {
            const list = document.getElementById('complaintList');
            list.innerHTML = '';
            
            mockComplaints.forEach(complaint => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${complaint.id}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${complaint.type}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm ${complaint.priority === '高' ? 'text-danger' : complaint.priority === '中' ? 'text-warning' : 'text-gray-900'}">${complaint.priority}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm ${complaint.status === '已处理' ? 'text-success' : complaint.status === '处理中' ? 'text-info' : 'text-gray-900'}">${complaint.status}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">${complaint.time}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                        <button class="text-primary hover:underline mr-2">查看</button>
                        <button class="text-success hover:underline mr-2">处理</button>
                        <button class="text-danger hover:underline">删除</button>
                    </td>
                `;
                list.appendChild(row);
            });
        }
        
        // 保存配置
        document.getElementById('saveBtn').addEventListener('click', function() {
            const config = {
                corpId: document.getElementById('corpId').value,
                appSecret: document.getElementById('appSecret').value,
                complaintType: document.getElementById('complaintType').value,
                priority: document.getElementById('priority').value,
                autoRule: document.getElementById('autoRule').value,
                enableAuto: document.getElementById('enableAuto').checked,
                notifyType: document.getElementById('notifyType').value,
                notifyReceiver: document.getElementById('notifyReceiver').value,
                wechatComplaintLink: document.getElementById('wechatComplaintLink').value,
                enableWechatCustomer: document.getElementById('enableWechatCustomer').checked
            };
            
            // 模拟保存
            localStorage.setItem('wechatComplaintConfig', JSON.stringify(config));
            alert('配置保存成功！');
        });
        
        // 测试连接
        document.getElementById('testBtn').addEventListener('click', function() {
            // 模拟测试
            alert('连接测试成功！');
        });
        
        // 重置
        document.getElementById('resetBtn').addEventListener('click', function() {
            if (confirm('确定要重置所有配置吗？')) {
                document.getElementById('corpId').value = '';
                document.getElementById('appSecret').value = '';
                document.getElementById('complaintType').value = 'harassment';
                document.getElementById('priority').value = 'medium';
                document.getElementById('autoRule').value = '';
                document.getElementById('enableAuto').checked = false;
                document.getElementById('notifyType').value = 'wechat';
                document.getElementById('notifyReceiver').value = '';
                document.getElementById('wechatComplaintLink').value = 'http://localhost:8000/complaint.html';
                document.getElementById('enableWechatCustomer').checked = false;
            }
        });
        
        // 加载配置
        function loadConfig() {
            const config = localStorage.getItem('wechatComplaintConfig');
            if (config) {
                const parsedConfig = JSON.parse(config);
                document.getElementById('corpId').value = parsedConfig.corpId || '';
                document.getElementById('appSecret').value = parsedConfig.appSecret || '';
                document.getElementById('complaintType').value = parsedConfig.complaintType || 'harassment';
                document.getElementById('priority').value = parsedConfig.priority || 'medium';
                document.getElementById('autoRule').value = parsedConfig.autoRule || '';
                document.getElementById('enableAuto').checked = parsedConfig.enableAuto || false;
                document.getElementById('notifyType').value = parsedConfig.notifyType || 'wechat';
                document.getElementById('notifyReceiver').value = parsedConfig.notifyReceiver || '';
                document.getElementById('wechatComplaintLink').value = parsedConfig.wechatComplaintLink || 'http://localhost:8000/complaint.html';
                document.getElementById('enableWechatCustomer').checked = parsedConfig.enableWechatCustomer || false;
            }
        }
        
        // 初始化
        window.onload = function() {
            loadConfig();
            renderComplaints();
        };
    </script>
</body>
</html>
